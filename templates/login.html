<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Conference Hall Booking - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-box glass-panel">
            <div class="login-header">
                <div class="logo-icon">🏢</div>
                <h1 class="logo">ConferenceFlow</h1>
            </div>
            <h2>Corporate Login</h2>
            <p class="subtitle">Enter your employee credentials to continue.</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="employee_id">Employee ID</label>
                    <input type="text" id="employee_id" name="employee_id" required placeholder="e.g. E001 or admin">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                <div id="loginError" class="error-msg"></div>
                <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Sign In</button>
            </form>
        </div>
    </div>
    <script src="/static/main.js"></script>
</body>
</html>
