<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Conference Booking - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
    font-family: 'Inter', sans-serif;
    background:#f5f6f8;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.login-box{
    background:white;
    padding:30px;
    width:300px;
    border-radius:8px;
    box-shadow:0 4px 20px rgba(0,0,0,0.1);
}
.login-error{
    color:red;
    text-align:center;
    margin-bottom:10px;
    font-weight:500;
}

.login-box h2{
    text-align:center;
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:4px;
}

button{
    width:100%;
    padding:10px;
    background:#1f3a8a;
    color:white;
    border:none;
    border-radius:4px;
    cursor:pointer;
}

button:hover{
    background:#162c66;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Conference Booking</h2>

<form method="POST" action="/login">
{% if error %}
<div class="login-error">
    {{ error }}
</div>
{% endif %}
<div class="form-group">
<input type="text" name="employee_id" placeholder="Employee ID or Email" required>
</div>

<div class="form-group">
<input type="password" name="password" placeholder="Password" required>
</div>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
